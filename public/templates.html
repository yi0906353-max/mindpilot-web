<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindPilot - 通知模板管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="container mx-auto px-4 py-8">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-2xl font-bold">📋 通知模板管理</h1>
      <button onclick="showCreateModal()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">+ 新建模板</button>
    </div>

    <!-- 搜索栏 -->
    <div class="mb-6">
      <input id="searchInput" type="text" placeholder="搜索模板..." oninput="filterTemplates()" class="w-full p-3 border rounded-lg">
    </div>

    <!-- 模板卡片列表 -->
    <div id="templateList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <!-- 模板编辑器弹窗 -->
    <div id="editorModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
      <div class="bg-white rounded-xl p-6 w-full max-w-2xl max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-4">
          <h2 id="editorTitle" class="text-xl font-bold">新建模板</h2>
          <button onclick="closeEditor()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
        </div>

        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium mb-1">模板名称</label>
            <input id="tplName" type="text" class="w-full p-2 border rounded">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">渠道</label>
            <select id="tplChannel" class="w-full p-2 border rounded">
              <option value="wechat">微信</option>
              <option value="email">邮件</option>
              <option value="sms">短信</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">标题模板</label>
            <input id="tplSubject" type="text" class="w-full p-2 border rounded" placeholder="支持变量: {{.UserName}} {{.Title}}">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">正文模板</label>
            <textarea id="tplBody" rows="6" class="w-full p-2 border rounded" placeholder="支持变量: {{.UserName}} {{.Summary}} {{.ThreeThings}} {{.ActionItems}}"></textarea>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">变量（逗号分隔）</label>
            <input id="tplVars" type="text" class="w-full p-2 border rounded" placeholder="UserName,Summary,ThreeThings">
          </div>
        </div>

        <!-- 预览区域 -->
        <div class="mt-4 p-4 bg-gray-50 rounded-lg">
          <h3 class="font-medium mb-2">预览效果</h3>
          <div id="previewContent" class="text-sm whitespace-pre-wrap"></div>
        </div>

        <div class="flex justify-end gap-2 mt-4">
          <button onclick="closeEditor()" class="px-4 py-2 border rounded hover:bg-gray-100">取消</button>
          <button onclick="saveTemplate()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">保存</button>
        </div>
      </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div id="deleteModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
      <div class="bg-white rounded-xl p-6 w-96">
        <h2 class="text-xl font-bold mb-4">确认删除</h2>
        <p class="text-gray-600 mb-4">确定要删除模板 "<span id="deleteTemplateName"></span>" 吗？此操作不可撤销。</p>
        <div class="flex justify-end gap-2">
          <button onclick="closeDeleteModal()" class="px-4 py-2 border rounded hover:bg-gray-100">取消</button>
          <button onclick="confirmDelete()" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">删除</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let templates = [];
    let editingId = null;
    let deletingId = null;

    // 加载模板列表
    async function loadTemplates() {
      try {
        const res = await fetch('/api/templates');
        const data = await res.json();
        templates = data.data || [];
        renderTemplates(templates);
      } catch(e) { console.error('加载失败:', e); }
    }

    // 渲染模板卡片
    function renderTemplates(list) {
      const container = document.getElementById('templateList');
      if (list.length === 0) {
        container.innerHTML = '<p class="text-gray-400 col-span-3 text-center py-8">暂无模板</p>';
        return;
      }
      container.innerHTML = list.map(t => `
        <div class="bg-white rounded-xl shadow p-5 hover:shadow-lg transition">
          <div class="flex justify-between items-start mb-3">
            <span class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-xs">${t.channel}</span>
            <div class="flex gap-1">
              <button onclick="editTemplate('${t.id}')" class="text-gray-400 hover:text-blue-600 text-sm">编辑</button>
              <button onclick="showDeleteModal('${t.id}','${t.name}')" class="text-gray-400 hover:text-red-600 text-sm">删除</button>
            </div>
          </div>
          <h3 class="font-bold text-lg mb-2">${t.name}</h3>
          <p class="text-sm text-gray-500 mb-3">${t.subject}</p>
          <div class="text-xs text-gray-400">
            变量: ${(t.variables||[]).map(v => '<code class="bg-gray-100 px-1 rounded">'+v+'</code>').join(' ')}
          </div>
        </div>
      `).join('');
    }

    // 搜索过滤
    function filterTemplates() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const filtered = templates.filter(t => t.name.toLowerCase().includes(q) || t.subject.toLowerCase().includes(q));
      renderTemplates(filtered);
    }

    // 显示创建弹窗
    function showCreateModal() {
      editingId = null;
      document.getElementById('editorTitle').textContent = '新建模板';
      document.getElementById('tplName').value = '';
      document.getElementById('tplChannel').value = 'wechat';
      document.getElementById('tplSubject').value = '';
      document.getElementById('tplBody').value = '';
      document.getElementById('tplVars').value = '';
      updatePreview();
      document.getElementById('editorModal').classList.remove('hidden');
    }

    // 编辑模板
    function editTemplate(id) {
      const t = templates.find(x => x.id === id);
      if (!t) return;
      editingId = id;
      document.getElementById('editorTitle').textContent = '编辑模板';
      document.getElementById('tplName').value = t.name;
      document.getElementById('tplChannel').value = t.channel;
      document.getElementById('tplSubject').value = t.subject;
      document.getElementById('tplBody').value = t.body;
      document.getElementById('tplVars').value = (t.variables||[]).join(',');
      updatePreview();
      document.getElementById('editorModal').classList.remove('hidden');
    }

    // 关闭编辑器
    function closeEditor() {
      document.getElementById('editorModal').classList.add('hidden');
    }

    // 实时预览
    function updatePreview() {
      const subject = document.getElementById('tplSubject').value;
      const body = document.getElementById('tplBody').value;
      const vars = document.getElementById('tplVars').value.split(',').filter(v=>v.trim());

      // 生成测试数据
      const testData = {};
      vars.forEach(v => {
        const key = v.trim();
        if (key === 'UserName') testData[key] = '张三';
        else if (key === 'Summary') testData[key] = '今日共有5条未读消息';
        else if (key === 'ThreeThings') testData[key] = '1. 处理重要消息\n2. 回复待办事项\n3. 查看每日简报';
        else if (key === 'ActionItems') testData[key] = '• 回复张三\n• 查看简报';
        else if (key.includes('Time')) testData[key] = '2025-01-15 14:00';
        else if (key.includes('Name')) testData[key] = '张三';
        else testData[key] = '测试数据';
      });

      let rendered = '【' + subject + '】\n\n' + body;
      vars.forEach(v => {
        const key = v.trim();
        rendered = rendered.replace(new RegExp('\\{\\{\\.' + key + '\\}\\}', 'g'), testData[key] || '');
      });

      document.getElementById('previewContent').textContent = rendered;
    }

    // 监听输入变化更新预览
    document.getElementById('tplSubject').addEventListener('input', updatePreview);
    document.getElementById('tplBody').addEventListener('input', updatePreview);
    document.getElementById('tplVars').addEventListener('input', updatePreview);

    // 保存模板
    async function saveTemplate() {
      const data = {
        name: document.getElementById('tplName').value,
        channel: document.getElementById('tplChannel').value,
        subject: document.getElementById('tplSubject').value,
        body: document.getElementById('tplBody').value,
        variables: document.getElementById('tplVars').value.split(',').filter(v=>v.trim()),
      };

      try {
        if (editingId) {
          await fetch(`/api/templates/${editingId}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
        } else {
          await fetch('/api/templates', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
        }
        closeEditor();
        loadTemplates();
      } catch(e) { alert('保存失败: ' + e.message); }
    }

    // 删除确认
    function showDeleteModal(id, name) {
      deletingId = id;
      document.getElementById('deleteTemplateName').textContent = name;
      document.getElementById('deleteModal').classList.remove('hidden');
    }

    function closeDeleteModal() {
      document.getElementById('deleteModal').classList.add('hidden');
    }

    async function confirmDelete() {
      if (!deletingId) return;
      await fetch(`/api/templates/${deletingId}`, { method: 'DELETE' });
      closeDeleteModal();
      loadTemplates();
    }

    // 初始化
    loadTemplates();
  </script>
</body>
</html>
